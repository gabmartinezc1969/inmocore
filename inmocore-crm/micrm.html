<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>MiCRM · Clientes y Leads</title>
<meta name="theme-color" content="#5B2A9D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MiCRM">
<link rel="manifest" href="manifest-micrm.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js" defer></script>
<style>
:root{
  --bg:#f3f1fa; --card:#ffffff; --text:#1c1330; --muted:#79708f; --border:#ece8f7;
  --primary1:#5B2A9D; --primary2:#E255A1; --grad:linear-gradient(135deg,var(--primary1),var(--primary2));
  --green:#1fb978; --pink:#E255A1; --amber:#f5a524; --red:#e5484d; --blue:#3d8bff;
  --radius:18px; --radius-sm:12px; --shadow:0 6px 20px rgba(60,20,90,.08); --shadow-lg:0 12px 34px rgba(60,20,90,.18);
  --nav-h:64px; --header-h:60px;
}
[data-theme="dark"]{
  --bg:#141020; --card:#1f1832; --text:#f3eefb; --muted:#a99ecb; --border:#332a4d;
  --shadow:0 6px 20px rgba(0,0,0,.5); --shadow-lg:0 12px 34px rgba(0,0,0,.6);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overscroll-behavior:none;
}
button,input,select,textarea{font-family:inherit; color:inherit;}
input,select,textarea{
  background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius-sm);
  padding:10px 12px; font-size:15px; width:100%; color:var(--text);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--primary2); outline-offset:1px;}
label{font-size:12.5px; font-weight:600; color:var(--muted); display:block; margin:10px 0 4px;}
button{cursor:pointer; border:none; background:none;}
.hidden{display:none !important;}
a{color:inherit;}
svg{display:block;}

#app{max-width:520px; margin:0 auto; min-height:100vh; position:relative; background:var(--bg); padding-bottom:calc(var(--nav-h) + 8px);}
#app-header{
  position:sticky; top:0; z-index:20; background:var(--grad); color:#fff; padding:14px 16px 18px;
  border-radius:0 0 22px 22px; box-shadow:var(--shadow);
}
#app-header .hd-row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
#app-header h1{font-size:19px; margin:0; font-weight:800; letter-spacing:.2px;}
#app-header .sub{font-size:12.5px; opacity:.85; margin-top:2px;}
.icon-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.18); color:#fff; flex-shrink:0;}
.icon-btn:active{background:rgba(255,255,255,.32);}
.icon-btn.ghost{background:var(--card); color:var(--primary1); box-shadow:var(--shadow);}
.header-search{margin-top:12px; position:relative;}
.header-search input{width:100%; border-radius:14px; border:none; padding:10px 12px 10px 38px; background:rgba(255,255,255,.92); color:#231a3a;}
.header-search svg{position:absolute; left:11px; top:11px; opacity:.55;}
.chips-row{display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding-bottom:2px;}
.chips-row::-webkit-scrollbar{display:none;}
.f-chip{flex-shrink:0; padding:6px 13px; border-radius:20px; background:rgba(255,255,255,.16); color:#fff; font-size:12.5px; font-weight:600; border:1px solid rgba(255,255,255,.3);}
.f-chip.active{background:#fff; color:var(--primary1);}

main{padding:14px 14px 90px;}
.view{display:none;}
.view.active{display:block;}

.card{background:var(--card); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px;}
.card h3{margin:0 0 8px; font-size:14.5px;}

.contact-row{display:flex; align-items:center; gap:12px; background:var(--card); border-radius:var(--radius); padding:11px 12px; margin-bottom:10px; box-shadow:var(--shadow);}
.avatar{width:46px;height:46px;border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:16px; flex-shrink:0;}
.contact-main{flex:1; min-width:0;}
.contact-main .cname{font-weight:700; font-size:15px; display:flex; align-items:center; gap:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.contact-main .csub{font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.chip{display:inline-block; padding:2px 9px; border-radius:20px; font-size:10.5px; font-weight:700; color:#fff; flex-shrink:0;}
.chip.cliente{background:var(--green);}
.chip.lead{background:var(--amber);}
.chip.perdida{background:var(--red);}
.chip.tarea{background:var(--green);}
.chip.reunion{background:var(--pink);}
.chip-outline{border:1.5px solid var(--border); color:var(--muted); background:transparent;}

#bottom-nav{
  position:fixed; bottom:0; left:0; right:0; max-width:520px; margin:0 auto; height:var(--nav-h);
  background:var(--card); box-shadow:0 -4px 18px rgba(0,0,0,.08); display:flex; z-index:30;
  border-radius:20px 20px 0 0;
}
#bottom-nav button{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--muted); font-size:10.5px; font-weight:600;}
#bottom-nav button.active{color:var(--primary1);}
#bottom-nav button svg{width:21px;height:21px;}

.fab{
  position:fixed; right:calc(50% - 260px + 18px); bottom:calc(var(--nav-h) + 18px); width:56px; height:56px; border-radius:50%;
  background:var(--grad); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-lg); z-index:25;
}
@media (max-width:559px){ .fab{right:18px;} }
.fab svg{width:26px;height:26px;}

.overlay{position:fixed; inset:0; z-index:60; background:var(--bg); max-width:520px; margin:0 auto; overflow-y:auto; display:flex; flex-direction:column;}
.overlay-header{position:sticky; top:0; background:var(--grad); color:#fff; padding:14px 14px 16px; display:flex; align-items:center; gap:10px; border-radius:0 0 20px 20px; z-index:5;}
.overlay-header h2{margin:0; font-size:17px; flex:1;}
.overlay-body{padding:14px; flex:1;}

.sheet-backdrop{position:fixed; inset:0; background:rgba(20,10,35,.5); z-index:70; display:flex; align-items:flex-end;}
.sheet{background:var(--bg); width:100%; max-width:520px; margin:0 auto; border-radius:22px 22px 0 0; max-height:92vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:slideup .18s ease-out;}
@keyframes slideup{from{transform:translateY(24px);opacity:.4;} to{transform:translateY(0);opacity:1;}}
.sheet-header{position:sticky; top:0; background:var(--bg); padding:14px 16px 8px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border);}
.sheet-header h2{font-size:16.5px; margin:0; flex:1;}
.sheet-body{padding:14px 16px 28px;}
.sheet-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:8px auto 0;}

.tabs{display:flex; gap:6px; background:var(--card); border-radius:14px; padding:4px; box-shadow:var(--shadow); margin-bottom:12px;}
.tabs button{flex:1; padding:8px 4px; border-radius:11px; font-size:12.5px; font-weight:700; color:var(--muted);}
.tabs button.active{background:var(--grad); color:#fff;}

.btn{padding:11px 16px; border-radius:14px; font-weight:700; font-size:14px; display:inline-flex; align-items:center; justify-content:center; gap:6px;}
.btn-primary{background:var(--grad); color:#fff; box-shadow:var(--shadow);}
.btn-outline{border:1.5px solid var(--border); color:var(--text); background:var(--card);}
.btn-danger{background:var(--red); color:#fff;}
.btn-block{width:100%;}
.btn-sm{padding:7px 12px; font-size:12.5px; border-radius:10px;}
.row-actions{display:flex; gap:8px; overflow-x:auto; margin:12px 0;}
.row-actions .qa{flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--text);}
.row-actions .qa .circ{width:46px;height:46px;border-radius:50%; background:var(--card); box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; color:var(--primary1);}

.field-row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.field-row input,.field-row select{flex:1;}
.small-x{width:30px;height:30px;border-radius:50%;background:var(--border); display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.link-add{color:var(--primary1); font-weight:700; font-size:13px; display:flex; align-items:center; gap:6px; margin-top:4px;}

.timeline-item{display:flex; gap:10px; margin-bottom:12px;}
.timeline-dot{width:34px;height:34px;border-radius:50%; background:var(--card); box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--primary1);}
.timeline-content{flex:1; background:var(--card); border-radius:14px; padding:10px 12px; box-shadow:var(--shadow);}
.timeline-content .t-meta{font-size:11px; color:var(--muted); margin-top:4px;}

.day-strip{display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:2px;}
.day-strip::-webkit-scrollbar{display:none;}
.day-item{flex-shrink:0; width:52px; padding:9px 0; border-radius:16px; background:var(--card); box-shadow:var(--shadow); text-align:center;}
.day-item .dname{font-size:10.5px; color:var(--muted); font-weight:700;}
.day-item .dnum{font-size:16px; font-weight:800; margin-top:2px;}
.day-item .ddot{width:5px;height:5px;border-radius:50%;background:var(--primary2); margin:4px auto 0; opacity:0;}
.day-item.has-events .ddot{opacity:1;}
.day-item.active{background:var(--grad); color:#fff;}
.day-item.active .dname{color:#fff;opacity:.85;}

.event-row{display:flex; align-items:center; gap:10px; background:var(--card); border-radius:14px; padding:10px 12px; margin-bottom:9px; box-shadow:var(--shadow);}
.event-time{font-size:12.5px; font-weight:700; width:46px; flex-shrink:0; color:var(--muted);}
.event-row.completed .event-title{text-decoration:line-through; color:var(--muted);}
.event-title{font-weight:700; font-size:14px;}
.event-sub{font-size:11.5px; color:var(--muted);}

.voice-player{display:flex; align-items:center; gap:9px; background:var(--card); border-radius:14px; padding:9px 11px; box-shadow:var(--shadow); margin-bottom:9px;}
.vp-btn{width:34px;height:34px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.vp-bar{flex:1; height:5px; border-radius:5px; background:var(--border); position:relative; cursor:pointer;}
.vp-bar-fill{position:absolute; left:0; top:0; height:100%; border-radius:5px; background:var(--grad); width:0%;}
.vp-time{font-size:10.5px; color:var(--muted); width:60px; text-align:right; flex-shrink:0;}

.note-card{border-radius:14px; padding:11px 12px; margin-bottom:9px; box-shadow:var(--shadow); color:#2a2038;}
.color-dot{width:22px;height:22px;border-radius:50%; flex-shrink:0; border:2px solid var(--card); box-shadow:0 0 0 1.5px var(--border);}
.color-dot.selected{box-shadow:0 0 0 2.5px var(--primary1);}
.color-swatches{display:flex; gap:8px; flex-wrap:wrap; margin:6px 0 10px;}

.doc-row{display:flex; align-items:center; gap:11px; background:var(--card); border-radius:14px; padding:10px 12px; margin-bottom:9px; box-shadow:var(--shadow);}
.doc-icon{width:40px;height:40px;border-radius:11px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--primary1); flex-shrink:0;}
.storage-bar{height:8px; border-radius:8px; background:var(--border); overflow:hidden; margin:8px 0;}
.storage-bar-fill{height:100%; background:var(--grad);}

.invoice-row{background:var(--card); border-radius:14px; padding:12px; margin-bottom:10px; box-shadow:var(--shadow);}
.invoice-row .irow-top{display:flex; justify-content:space-between; align-items:center;}
.invoice-row .itotal{font-weight:800; font-size:16px;}
.status-badge{padding:3px 10px; border-radius:20px; font-size:10.5px; font-weight:700; color:#fff;}
.status-borrador{background:var(--muted);}
.status-enviada{background:var(--blue);}
.status-pagada{background:var(--green);}
.status-vencida{background:var(--red);}
.item-line{display:flex; gap:6px; align-items:center; margin-bottom:7px;}
.item-line input{flex:1;}
.item-line .qty{width:52px; flex:none;}
.item-line .price{width:78px; flex:none;}
.totals-box{background:var(--card); border-radius:14px; padding:12px; box-shadow:var(--shadow); margin-top:8px;}
.totals-box .trow{display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:4px;}
.totals-box .trow.grand{font-weight:800; font-size:16.5px; margin-top:6px; padding-top:6px; border-top:1px solid var(--border);}

.settings-item{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border);}
.settings-item:last-child{border-bottom:none;}
.settings-item .label-txt{font-weight:600; font-size:14px;}
.settings-item .desc-txt{font-size:11.5px; color:var(--muted); margin-top:2px;}
.switch{width:44px;height:25px;border-radius:20px;background:var(--border); position:relative; flex-shrink:0;}
.switch.on{background:var(--grad);}
.switch .knob{width:20px;height:20px;border-radius:50%;background:#fff; position:absolute; top:2.5px; left:2.5px; transition:left .15s; box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch.on .knob{left:21.5px;}

.more-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.more-card{background:var(--card); border-radius:16px; padding:16px 12px; box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:flex-start; gap:8px;}
.more-card .mc-icon{width:38px;height:38px;border-radius:11px; background:var(--grad); color:#fff; display:flex; align-items:center; justify-content:center;}
.more-card .mc-title{font-weight:700; font-size:13.5px;}

.dash-cards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
.dash-card{background:var(--card); border-radius:16px; padding:13px; box-shadow:var(--shadow);}
.dash-card .num{font-size:22px; font-weight:800;}
.dash-card .lbl{font-size:11.5px; color:var(--muted); margin-top:2px;}
.chart-wrap{background:var(--card); border-radius:16px; padding:14px; box-shadow:var(--shadow); margin-bottom:14px;}
.chart-wrap h4{margin:0 0 10px; font-size:13.5px;}

#lock-screen{position:fixed; inset:0; z-index:999; background:var(--grad); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; padding:20px;}
#lock-screen h2{margin:18px 0 4px;}
.pin-dots{display:flex; gap:14px; margin:18px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%; border:2px solid #fff;}
.pin-dot.filled{background:#fff;}
.keypad{display:grid; grid-template-columns:repeat(3,64px); gap:14px; margin-top:20px;}
.keypad button{width:64px;height:64px;border-radius:50%; background:rgba(255,255,255,.14); color:#fff; font-size:22px; font-weight:600;}
.keypad button:active{background:rgba(255,255,255,.3);}
.shake{animation:shake .35s;}
@keyframes shake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(4px);}30%,50%,70%{transform:translateX(-8px);}40%,60%{transform:translateX(8px);}}

#toast{position:fixed; bottom:calc(var(--nav-h) + 16px); left:50%; transform:translateX(-50%); background:#241a38; color:#fff; padding:10px 18px; border-radius:30px; font-size:13px; z-index:999; box-shadow:var(--shadow-lg); opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;}
#toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

#map-el{width:100%; height:340px; border-radius:16px; overflow:hidden; box-shadow:var(--shadow);}
.route-panel{margin-top:12px;}
.route-stop{display:flex; align-items:center; gap:10px; background:var(--card); border-radius:12px; padding:9px 11px; margin-bottom:7px; box-shadow:var(--shadow);}
.route-num{width:24px;height:24px;border-radius:50%; background:var(--grad); color:#fff; font-size:11.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;}

.empty-state{text-align:center; padding:40px 20px; color:var(--muted);}
.empty-state svg{margin:0 auto 10px; opacity:.5;}

#invoice-print{display:none;}
@media print{
  body *{visibility:hidden;}
  #invoice-print, #invoice-print *{visibility:visible;}
  #invoice-print{display:block; position:absolute; top:0; left:0; width:100%; padding:24px; color:#000; background:#fff;}
  #invoice-print .p-total{font-size:20px; font-weight:800;}
}
.field-def-row{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:12px; padding:10px 12px; margin-bottom:8px; box-shadow:var(--shadow);}
.group-def-row{display:flex; align-items:center; gap:10px; background:var(--card); border-radius:12px; padding:10px 12px; margin-bottom:8px; box-shadow:var(--shadow);}
.search-bar-inline{position:relative; margin-bottom:12px;}
.search-bar-inline input{padding-left:36px;}
.search-bar-inline svg{position:absolute; left:10px; top:11px; opacity:.5;}
</style>
</head>
<body>

<div id="lock-screen" class="hidden">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
  <h2>MiCRM bloqueado</h2>
  <div class="sub" style="opacity:.85; font-size:13px;">Ingresa tu PIN de 4 dígitos</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="keypad" id="keypad"></div>
  <button class="btn-sm" id="btn-webauthn" style="margin-top:18px; background:rgba(255,255,255,.16); color:#fff; border-radius:20px; padding:9px 18px; display:none;">Usar huella / Face ID</button>
</div>

<div id="app" class="hidden">
  <header id="app-header"></header>
  <main id="main"></main>
  <button class="fab hidden" id="fab-main"></button>
  <nav id="bottom-nav">
    <button data-view="contacts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>Contactos</button>
    <button data-view="agenda"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>Agenda</button>
    <button data-view="map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>Mapa</button>
    <button data-view="invoices"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h9l3 3v17H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>Facturas</button>
    <button data-view="more"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>Más</button>
  </nav>
</div>

<div id="contact-detail" class="overlay hidden"></div>
<div id="modal-root"></div>
<div id="toast"></div>
<div id="invoice-print"></div>

<script>
(function(){
"use strict";

/* ===================== ICONS ===================== */
const ICO = {
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>',
  close:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>',
  search:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L15 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>',

/* ===================== IDB (blobs: documents, voice notes, fs handles) ===================== */
let _idbPromise=null;
function idbOpen(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve,reject)=>{
    if(!('indexedDB' in window)){ reject(new Error('IndexedDB no soportado')); return; }
    const req = indexedDB.open('micrm_db', 1);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains('files')) db.createObjectStore('files', {keyPath:'id'});
      if(!db.objectStoreNames.contains('handles')) db.createObjectStore('handles', {keyPath:'id'});
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return _idbPromise;
}
async function idbPut(store, obj){ const db = await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(obj); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function idbGet(store, id){ const db = await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const r=tx.objectStore(store).get(id); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbDelete(store, id){ const db = await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }

function fmtTime(iso){ const d=new Date(iso); return d.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'}); }

/* ===================== INVOICE MATH ===================== */
function computeInvoiceTotals(items, ivaRate){
  const subtotal = (items||[]).reduce((s,it)=> s + (Number(it.qty)||0) * (Number(it.price)||0), 0);
  const iva = subtotal * ((Number(ivaRate)||0) / 100);
  const total = subtotal + iva;
  return {subtotal, iva, total};
}

/* ===================== ROUTE / HAVERSINE ===================== */
function toRad(d){ return d * Math.PI / 180; }
function haversine(a, b){
  const R = 6371;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}
function nearestNeighborRoute(points){
  if(!points || points.length === 0) return {route:[], totalDist:0};
  const remaining = points.slice(1);
  const route = [points[0]];
  let current = points[0], totalDist = 0;
  while(remaining.length){
    let bestIdx = 0, bestDist = Infinity;
    remaining.forEach((p,i)=>{ const d = haversine(current, p); if(d < bestDist){ bestDist = d; bestIdx = i; } });
    totalDist += bestDist;
    current = remaining.splice(bestIdx,1)[0];
    route.push(current);
  }
  return {route, totalDist};
}

function exportAllData(){

function importAllData(obj){
  if(!obj || typeof obj !== 'object') throw new Error('JSON inválido');
  state.contacts = Array.isArray(obj.contacts) ? obj.contacts : [];
  state.notes = Array.isArray(obj.notes) ? obj.notes : [];
  state.voicenotes = Array.isArray(obj.voicenotes) ? obj.voicenotes : [];
  state.events = Array.isArray(obj.events) ? obj.events : [];
  state.invoices = Array.isArray(obj.invoices) ? obj.invoices : [];
  state.fields = Array.isArray(obj.fields) ? obj.fields : [];
  state.groups = Array.isArray(obj.groups) ? obj.groups : [];

  state.settings = Object.assign({}, DEFAULT_SETTINGS, obj.settings || {});
  ['contacts','notes','voicenotes','events','invoices','fields','groups','documents','settings'].forEach(persist);
}
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type: mime || 'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function toCSV(rows){
  return rows.map(r => r.map(v=>{
    v = v==null ? '' : String(v);
    if(/[",\n;]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
    return v;
  }).join(',')).join('\r\n');
}
function exportContactsCSV(){
  const rows = [['Nombre','Cargo','Categoría','Teléfono','Email','Dirección']];

    rows.push([c.name, c.cargo||'', c.category, (c.phones[0]||{}).number||'', (c.emails[0]||{}).email||'', c.address||'']);
  });
  downloadFile('contactos_micrm.csv', toCSV(rows), 'text/csv');
}
function exportInvoicesCSV(){
  const rows = [['Número','Contacto','Fecha','Estado','Subtotal','IVA','Total']];
  state.invoices.forEach(inv=>{
    const t = computeInvoiceTotals(inv.items, inv.ivaRate);
    rows.push(['#'+String(inv.number).padStart(4,'0'), contactName(inv.contactId), fmtDate(inv.date), inv.status, t.subtotal.toFixed(2), t.iva.toFixed(2), t.total.toFixed(2)]);
  });
  downloadFile('facturas_micrm.csv', toCSV(rows), 'text/csv');
}

/* ===================== BACKUP FILE SYNC (File System Access API) ===================== */
let backupHandle = null, backupWriteTimer = null;
async function scheduleBackupWrite(){
  if(!backupHandle) return;
  clearTimeout(backupWriteTimer);
  backupWriteTimer = setTimeout(writeBackupNow, 800);
}
async function writeBackupNow(){
  if(!backupHandle) return;
  try{
    if((await backupHandle.queryPermission({mode:'readwrite'})) !== 'granted'){
      if((await backupHandle.requestPermission({mode:'readwrite'})) !== 'granted') return;
    }
    const writable = await backupHandle.createWritable();
    await writable.write(JSON.stringify(exportAllData(), null, 2));
    await writable.close();
  }catch(e){ /* silent: user may need to reconnect */ }
}
async function linkBackupFile(){
  if(!window.showSaveFilePicker){
    toast('Tu navegador no soporta vinculación de archivos. Se descargará un respaldo manual.');
    downloadFile('micrm_backup.json', JSON.stringify(exportAllData(), null, 2), 'application/json');
    return;
  }
  try{
    backupHandle = await window.showSaveFilePicker({suggestedName:'micrm_backup.json', types:[{description:'JSON', accept:{'application/json':['.json']}}]});
    await idbPut('handles', {id:'backup', handle: backupHandle});
    state.settings.backupFileName = backupHandle.name; persist('settings');
    await writeBackupNow();
    toast('Archivo de respaldo vinculado');
    renderSettingsView();
  }catch(e){ /* user cancelled */ }
}
async function tryRestoreBackupHandle(){
  try{
    const rec = await idbGet('handles', 'backup');
    if(rec && rec.handle){
      backupHandle = rec.handle;
    }
  }catch(e){}
}

/* ===================== SECURITY (PIN) ===================== */
async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
let pinBuffer = '';
function buildKeypad(){
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  const kp = document.getElementById('keypad');
  kp.innerHTML = keys.map(k=> k==='' ? '<div></div>' : `<button data-k="${k}">${k}</button>`).join('');
  kp.querySelectorAll('button').forEach(b=> b.addEventListener('click', ()=>onPinKey(b.dataset.k)));
}
function onPinKey(k){
  if(k === '⌫'){ pinBuffer = pinBuffer.slice(0,-1); }
  else if(pinBuffer.length < 4){ pinBuffer += k; }
  renderPinDots();
  if(pinBuffer.length === 4) checkPin();
}
function renderPinDots(){
  document.querySelectorAll('#pin-dots .pin-dot').forEach((d,i)=> d.classList.toggle('filled', i < pinBuffer.length));
}
async function checkPin(){
  const hash = await sha256(pinBuffer);
  if(hash === state.settings.pinHash){
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    pinBuffer = '';
  } else {
    const ls = document.getElementById('lock-screen');
    ls.classList.add('shake');
    setTimeout(()=>{ ls.classList.remove('shake'); pinBuffer=''; renderPinDots(); }, 380);
    toast('PIN incorrecto');
  }
}
async function tryWebAuthn(){
  if(!window.PublicKeyCredential) return;
  try{
    const avail = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(avail){ document.getElementById('btn-webauthn').style.display = 'inline-flex'; }
  }catch(e){}
}
function showLockScreen(){
  document.getElementById('lock-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  buildKeypad(); renderPinDots(); tryWebAuthn();
}

function renderGroupFilterRow(){

/* ===================== UI STATE ===================== */
const uiState = {contactSearch:'', groupFilter:null, agendaDate: new Date(), contactDetailId:null, contactDetailTab:'contacto',
  routeSelection:[], docSearch:'', currentAudio:null };

/* ===================== VIEW: CONTACTS ===================== */
function categoryLabel(cat){ return {cliente:'Cliente', lead:'Lead', perdida:'Oport. perdida'}[cat] || cat; }
function filteredContacts(){
  let list = state.contacts.slice();
  if(uiState.groupFilter) list = list.filter(c => (c.groups||[]).includes(uiState.groupFilter));
  const q = uiState.contactSearch.trim().toLowerCase();
  if(q) list = list.filter(c => c.name.toLowerCase().includes(q) || (c.cargo||'').toLowerCase().includes(q));
  return list.sort((a,b)=> a.name.localeCompare(b.name, 'es'));
}
function contactRowHtml(c){
  const phone = (c.phones && c.phones[0]) ? c.phones[0].number : '';
  return `<div class="contact-row" data-id="${c.id}">
    <div class="avatar" style="background:${c.avatarColor}">${initials(c.name)}</div>
    <div class="contact-main">
      <div class="cname">${escapeHtml(c.name)} <span class="chip ${c.category}">${categoryLabel(c.category)}</span></div>
      <div class="csub">${escapeHtml(c.cargo||phone||'')}</div>
    </div>
  </div>`;
}
function renderContactsView(){
  document.getElementById('main').innerHTML = `<div id="contacts-list"></div>`;
  renderContactsList();
}
function renderContactsList(){
  const el = document.getElementById('contacts-list');
  if(!el) return;
  const list = filteredContacts();
  el.innerHTML = list.length ? list.map(contactRowHtml).join('') :
    `<div class="empty-state"><p>No se encontraron contactos.</p></div>`;
  el.querySelectorAll('.contact-row').forEach(row=> row.addEventListener('click', ()=> openContactDetail(row.dataset.id)));
}

/* ===================== CONTACT FORM (sheet) ===================== */
function openSheet(html, onMount){
  closeSheet();
  const backdrop = document.createElement('div');
  backdrop.className = 'sheet-backdrop'; backdrop.id = 'active-sheet-backdrop';
  backdrop.innerHTML = `<div class="sheet">${html}</div>`;
  backdrop.addEventListener('click', (e)=>{ if(e.target === backdrop) closeSheet(); });
  document.getElementById('modal-root').appendChild(backdrop);
  if(onMount) onMount(backdrop);
}
function closeSheet(){ const b = document.getElementById('active-sheet-backdrop'); if(b) b.remove(); }

function fieldTypeInput(f, value){
  const v = escapeHtml(value||'');
  const typeMap = {Texto:'text', Número:'number', Teléfono:'tel', Email:'email', 'Sitio web':'url', Fecha:'date', Hora:'time'};
  return `<input type="${typeMap[f.type]||'text'}" data-custom-field="${f.id}" value="${v}">`;
}
function openContactForm(contactId){

  <div class="sheet-handle"></div>

  <div class="sheet-body">
    <form id="contact-form">
      <label>Nombre completo</label>
      <input name="name" required value="${escapeHtml(c?c.name:'')}">
      <label>Cargo / Profesión</label>
      <input name="cargo" value="${escapeHtml(c?c.cargo:'')}">
      <label>Categoría</label>
      <select name="category">
        <option value="lead" ${c&&c.category==='lead'?'selected':''}>Lead</option>

      <label>Correos</label>
      <div id="emails-wrap">${emails.map(em=>emailRowHtml(em)).join('')}</div>
      <div class="link-add" id="add-email">${ICO.plus} Agregar correo</div>

      <label>Sitio web</label>
      <input name="website" value="${escapeHtml(c?c.website:'')}">

      <label>Dirección</label>
      <input name="address" id="addr-input" value="${escapeHtml(c?c.address:'')}">
      <div style="display:flex; gap:8px; margin-top:6px;">
        <input name="lat" id="lat-input" placeholder="Latitud" value="${c&&c.lat!=null?c.lat:''}">
        <input name="lng" id="lng-input" placeholder="Longitud" value="${c&&c.lng!=null?c.lng:''}">
      </div>

      ${state.fields.length ? `<label>Campos personalizados</label>` + state.fields.map(f=>`
        <div style="margin-bottom:8px;"><label style="margin-top:0;">${escapeHtml(f.name)}</label>${fieldTypeInput(f, c && c.customFields ? c.customFields[f.id] : '')}</div>
      `).join('') : ''}

      ${state.groups.length ? `<label>Grupos</label><div class="color-swatches" id="group-checks">` + state.groups.map(g=>`
        <label style="display:flex; align-items:center; gap:6px; border:1.5px solid var(--border); padding:6px 10px; border-radius:20px; font-size:12.5px; font-weight:600;">
          <input type="checkbox" value="${g.id}" style="width:auto;" ${c && (c.groups||[]).includes(g.id)?'checked':''}> <span style="color:${g.color}">●</span> ${escapeHtml(g.name)}
        </label>`).join('') + `</div>` : ''}

      <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;">Guardar contacto</button>
      ${c ? `<button type="button" class="btn btn-danger btn-block" style="margin-top:10px;" id="delete-contact-btn">Eliminar contacto</button>` : ''}

  openSheet(html, (root)=>{
    root.querySelector('#sheet-close').addEventListener('click', closeSheet);

      const wrap = root.querySelector('#phones-wrap');
      wrap.insertAdjacentHTML('beforeend', phoneRowHtml({id:uid(), label:'Móvil', number:''}));
      bindRemoveButtons(root);
    });
    root.querySelector('#add-email').addEventListener('click', ()=>{
      const wrap = root.querySelector('#emails-wrap');
      wrap.insertAdjacentHTML('beforeend', emailRowHtml({id:uid(), label:'Trabajo', email:''}));
      bindRemoveButtons(root);
    });
    bindRemoveButtons(root);
    root.querySelector('#geocode-btn').addEventListener('click', ()=>geocodeAddress(root));
    if(c) root.querySelector('#delete-contact-btn').addEventListener('click', ()=>{
      confirmDialog('¿Eliminar este contacto? Esta acción no se puede deshacer.', ()=>{ deleteContact(c.id); closeSheet(); });
    });
    root.querySelector('#contact-form').addEventListener('submit', (e)=>{
      e.preventDefault();
      submitContactForm(e.target, c ? c.id : null);
    });

function phoneRowHtml(p){
  return `<div class="field-row" data-phone-id="${p.id}">
    <select class="ph-label" style="max-width:96px;"><option ${p.label==='Móvil'?'selected':''}>Móvil</option><option ${p.label==='Casa'?'selected':''}>Casa</option><option ${p.label==='Trabajo'?'selected':''}>Trabajo</option></select>
    <input class="ph-number" type="tel" value="${escapeHtml(p.number)}" placeholder="+52 55 0000 0000">
    <div class="small-x remove-row">${ICO.close}</div>
  </div>`;
}
function emailRowHtml(em){
  return `<div class="field-row" data-email-id="${em.id}">
    <select class="em-label" style="max-width:96px;"><option ${em.label==='Trabajo'?'selected':''}>Trabajo</option><option ${em.label==='Personal'?'selected':''}>Personal</option></select>
    <input class="em-email" type="email" value="${escapeHtml(em.email)}" placeholder="correo@ejemplo.com">
    <div class="small-x remove-row">${ICO.close}</div>
  </div>`;
}
function bindRemoveButtons(root){
  root.querySelectorAll('.remove-row').forEach(btn=>{
    btn.onclick = ()=> btn.closest('.field-row').remove();
  });
}
async function geocodeAddress(root){
  const addr = root.querySelector('#addr-input').value.trim();
  if(!addr){ toast('Escribe una dirección primero'); return; }
  try{
    const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(addr));
    const data = await res.json();
    if(data && data[0]){
      root.querySelector('#lat-input').value = data[0].lat;
      root.querySelector('#lng-input').value = data[0].lon;
      toast('Coordenadas encontradas');
    } else toast('No se encontraron coordenadas');
  }catch(e){ toast('Sin conexión para geocodificar'); }
}
function submitContactForm(form, contactId){
  const fd = new FormData(form);
  const phones = [...form.querySelectorAll('[data-phone-id]')].map(row=>({
    id: row.dataset.phoneId, label: row.querySelector('.ph-label').value, number: row.querySelector('.ph-number').value.trim()
  })).filter(p=>p.number);
  const emails = [...form.querySelectorAll('[data-email-id]')].map(row=>({
    id: row.dataset.emailId, label: row.querySelector('.em-label').value, email: row.querySelector('.em-email').value.trim()
  })).filter(e=>e.email);
  const customFields = {};
  form.querySelectorAll('[data-custom-field]').forEach(inp=> customFields[inp.dataset.customField] = inp.value);
  const groups = [...form.querySelectorAll('#group-checks input:checked')].map(i=>i.value);
  const latVal = form.querySelector('#lat-input').value, lngVal = form.querySelector('#lng-input').value;
  const payload = {
    name: fd.get('name').trim(), cargo: fd.get('cargo').trim(), category: fd.get('category'),
    phones, emails, website: fd.get('website').trim(), address: fd.get('address').trim(),
    lat: latVal ? parseFloat(latVal) : null, lng: lngVal ? parseFloat(lngVal) : null,
    customFields, groups
  };
  if(contactId){ updateContact(contactId, payload); toast('Contacto actualizado'); }
  else { addContact(payload); toast('Contacto creado'); }
  closeSheet();
}
function addContact(payload){
  const AVATAR_COLORS = ['#5B2A9D','#E255A1','#1fb978','#3d8bff','#f5a524','#e5484d'];
  const c = Object.assign({id:uid(), avatarColor:AVATAR_COLORS[state.contacts.length % AVATAR_COLORS.length], createdAt:nowIso()}, payload);
  state.contacts.push(c); persist('contacts'); render();
  return c;
}
function updateContact(id, payload){
  const c = findContact(id); if(!c) return;
  Object.assign(c, payload); persist('contacts'); render();
}
function deleteContact(id){
  state.contacts = state.contacts.filter(c=>c.id!==id);
  state.notes = state.notes.filter(n=>n.contactId!==id);
  state.events = state.events.filter(e=>e.contactId!==id);
  ['contacts','notes','events'].forEach(persist);
  if(uiState.contactDetailId === id) closeContactDetail();
  render();
}

function handleQuickAction(action, c){

function renderContactDetailTab(c){

function contactInfoTabHtml(c){
  const phonesHtml = (c.phones||[]).map(p=>`
    <div class="card" style="display:flex; align-items:center; justify-content:space-between; padding:12px 14px;">
      <div><div style="font-weight:700; font-size:14px;">${escapeHtml(p.number)}</div><div style="font-size:11.5px; color:var(--muted);">${escapeHtml(p.label)}</div></div>

      </div>
    </div>`).join('');
  const emailsHtml = (c.emails||[]).map(em=>`
    <div class="card" style="display:flex; align-items:center; justify-content:space-between; padding:12px 14px;">
      <div><div style="font-weight:700; font-size:14px;">${escapeHtml(em.email)}</div><div style="font-size:11.5px; color:var(--muted);">${escapeHtml(em.label)}</div></div>
      <a class="icon-btn ghost" href="mailto:${escapeHtml(em.email)}">${ICO.mail}</a>
    </div>`).join('');
  const groupsHtml = (c.groups||[]).map(gid=>{ const g = state.groups.find(x=>x.id===gid); return g ? `<span class="chip" style="background:${g.color}">${escapeHtml(g.name)}</span>` : ''; }).join(' ');
  const customHtml = state.fields.length ? `<div class="card"><h3>Campos personalizados</h3>` + state.fields.map(f=>`
    <div style="display:flex; justify-content:space-between; font-size:13.5px; padding:5px 0;"><span style="color:var(--muted);">${escapeHtml(f.name)}</span><span>${escapeHtml((c.customFields||{})[f.id]||'—')}</span></div>
  `).join('') + `</div>` : '';
  return `${phonesHtml}${emailsHtml}
    ${c.website ? `<div class="card"><a href="${escapeHtml(c.website)}" target="_blank" rel="noopener">${escapeHtml(c.website)}</a></div>` : ''}
    ${c.address ? `<div class="card"><h3>Dirección</h3><p style="margin:0; font-size:13.5px;">${escapeHtml(c.address)}</p>${c.lat!=null?`<p style="margin:4px 0 0; font-size:11.5px; color:var(--muted);">${c.lat}, ${c.lng}</p>`:''}</div>` : ''}
    ${groupsHtml ? `<div class="card"><h3>Grupos</h3>${groupsHtml}</div>` : ''}

function activityTabHtml(c){
  const notes = state.notes.filter(n=>n.contactId===c.id).map(n=>({...n, kind:'nota', ts:n.createdAt}));
  const voices = state.voicenotes.filter(v=>v.contactId===c.id).map(v=>({...v, kind:'voz', ts:v.createdAt}));
  const events = state.events.filter(e=>e.contactId===c.id).map(e=>({...e, kind:e.type, ts:e.date}));
  const invoices = state.invoices.filter(i=>i.contactId===c.id).map(i=>({...i, kind:'factura', ts:i.createdAt}));
  const items = [...notes, ...voices, ...events, ...invoices].sort((a,b)=> new Date(b.ts) - new Date(a.ts));
  if(!items.length) return `<div class="empty-state">Sin actividad registrada aún.</div>`;
  return items.map(it=>{
    if(it.kind === 'nota') return `<div class="timeline-item"><div class="timeline-dot">${ICO.note}</div><div class="timeline-content"><div>${escapeHtml(it.text)}</div><div class="t-meta">${fmtDateTime(it.ts)}</div></div></div>`;
    if(it.kind === 'voz') return `<div class="timeline-item"><div class="timeline-dot">${ICO.mic}</div><div class="timeline-content"><div>Nota de voz (${it.duration||0}s)</div><div id="vp-${it.id}"></div><div class="t-meta">${fmtDateTime(it.ts)}</div></div></div>`;
    if(it.kind === 'tarea' || it.kind === 'reunion') return `<div class="timeline-item"><div class="timeline-dot">${it.kind==='tarea'?ICO.check:ICO.cal}</div><div class="timeline-content"><div>${escapeHtml(it.title)} <span class="chip ${it.kind}">${it.kind==='tarea'?'Tarea':'Reunión'}</span></div><div class="t-meta">${fmtDateTime(it.ts)}</div></div></div>`;
    if(it.kind === 'factura') return `<div class="timeline-item"><div class="timeline-dot">${ICO.file}</div><div class="timeline-content"><div>Factura #${String(it.number).padStart(4,'0')}</div><div class="t-meta">${fmtDateTime(it.ts)}</div></div></div>`;
    return '';
  }).join('');
}
function filesTabHtml(c){
  const docs = state.documents.filter(d=>d.contactId===c.id);
  return `<button class="btn btn-outline btn-block" id="cd-link-doc">${ICO.upload} Adjuntar documento</button>

function invoicesTabHtml(c){
  const invs = state.invoices.filter(i=>i.contactId===c.id);

function bindDetailTabEvents(c){

  if(uiState.contactDetailTab === 'facturas'){

function openNoteForm(contactId){
  const html = `<div class="sheet-handle"></div>

    <button class="btn btn-primary btn-block" id="save-note-btn">Guardar nota</button>
  </div>`;
  let selColor = NOTE_COLORS[0];
  openSheet(html, (root)=>{
    root.querySelector('#sheet-close').addEventListener('click', closeSheet);

/* ===================== VOICE NOTES ===================== */
let mediaRecorder = null, recordedChunks = [], recordStart = 0;
function openVoiceRecorder(contactId){
  const html = `<div class="sheet-handle"></div>
  <div class="sheet-header"><button class="icon-btn ghost" id="sheet-close">${ICO.close}</button><h2>Nota de voz</h2></div>
  <div class="sheet-body" style="text-align:center;">
    <div class="icon-btn" id="rec-btn" style="width:80px;height:80px;margin:20px auto; background:var(--grad); color:#fff;">${ICO.mic}</div>
    <div id="rec-status" style="color:var(--muted); font-size:13px;">Toca para grabar</div>
    <div id="rec-timer" style="font-size:22px; font-weight:800; margin-top:8px;">00:00</div>
  </div>`;
  openSheet(html, (root)=>{
    root.querySelector('#sheet-close').addEventListener('click', ()=>{ stopRecordingIfActive(); closeSheet(); });
    let recording = false, timerInt = null;
    root.querySelector('#rec-btn').addEventListener('click', async ()=>{
      if(!recording){
        try{
          const stream = await navigator.mediaDevices.getUserMedia({audio:true});
          recordedChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e=> recordedChunks.push(e.data);
          mediaRecorder.onstop = async ()=>{
            const blob = new Blob(recordedChunks, {type:'audio/webm'});
            const duration = Math.round((Date.now()-recordStart)/1000);
            const id = uid();
            await idbPut('files', {id, blob, mime:'audio/webm'});
            state.voicenotes.push({id, contactId, duration, createdAt:nowIso()});
            persist('voicenotes');
            toast('Nota de voz guardada');
            if(uiState.contactDetailId === contactId) renderContactDetail();
            stream.getTracks().forEach(t=>t.stop());
          };
          mediaRecorder.start(); recordStart = Date.now(); recording = true;
          root.querySelector('#rec-status').textContent = 'Grabando... toca para detener';
          timerInt = setInterval(()=>{
            const s = Math.round((Date.now()-recordStart)/1000);
            root.querySelector('#rec-timer').textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
          }, 250);
        }catch(e){ toast('No se pudo acceder al micrófono'); }
      } else {
        recording = false; clearInterval(timerInt);
        if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        root.querySelector('#rec-status').textContent = 'Guardado';
        closeSheet();
      }
    });
  });
}
function stopRecordingIfActive(){ if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }
async function mountVoicePlayer(elId, voiceId){
  const el = document.getElementById(elId); if(!el) return;
  const v = state.voicenotes.find(x=>x.id===voiceId);
  const totalTime = v ? v.duration : 0;
  el.innerHTML = `<div class="voice-player"><div class="vp-btn" id="btn-${elId}">${ICO.play}</div>
    <div class="vp-bar" id="bar-${elId}"><div class="vp-bar-fill" id="fill-${elId}"></div></div>
    <div class="vp-time" id="time-${elId}">0:00 / ${fmtSec(totalTime)}</div></div>`;
  let audioEl = null;
  document.getElementById('btn-'+elId).addEventListener('click', async ()=>{
    if(!audioEl){
      const rec = await idbGet('files', voiceId);
      if(!rec){ toast('Audio no disponible'); return; }
      const url = URL.createObjectURL(rec.blob);
      audioEl = new Audio(url);
      audioEl.addEventListener('timeupdate', ()=>{
        const pct = audioEl.duration ? (audioEl.currentTime/audioEl.duration)*100 : 0;
        const fill = document.getElementById('fill-'+elId); if(fill) fill.style.width = pct+'%';
        const t = document.getElementById('time-'+elId); if(t) t.textContent = fmtSec(Math.floor(audioEl.currentTime)) + ' / ' + fmtSec(Math.floor(audioEl.duration||totalTime));
      });
      audioEl.addEventListener('ended', ()=>{ const b=document.getElementById('btn-'+elId); if(b) b.innerHTML = ICO.play; });
    }
    if(audioEl.paused){ if(uiState.currentAudio && uiState.currentAudio!==audioEl) uiState.currentAudio.pause(); audioEl.play(); uiState.currentAudio = audioEl; document.getElementById('btn-'+elId).innerHTML = ICO.pause; }
    else { audioEl.pause(); document.getElementById('btn-'+elId).innerHTML = ICO.play; }
  });
  const bar = document.getElementById('bar-'+elId);
  bar.addEventListener('click', (e)=>{
    if(!audioEl || !audioEl.duration) return;
    const rect = bar.getBoundingClientRect();
    audioEl.currentTime = ((e.clientX-rect.left)/rect.width) * audioEl.duration;
  });
}
function fmtSec(s){ s = s||0; return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function renderAgendaView(){
  document.getElementById('main').innerHTML = `<div class="day-strip" id="day-strip"></div><div id="agenda-list"></div>`;
  renderDayStrip(); renderAgendaList();
}
function weekDatesAround(d){
  const start = new Date(d); const day = start.getDay(); start.setDate(start.getDate()-day);
  return Array.from({length:7}, (_,i)=>{ const dd = new Date(start); dd.setDate(start.getDate()+i); return dd; });
}
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function renderDayStrip(){
  const strip = document.getElementById('day-strip');
  const days = weekDatesAround(uiState.agendaDate);
  const dnames = ['D','L','M','M','J','V','S'];
  strip.innerHTML = days.map(d=>{
    const has = state.events.some(e=> sameDay(new Date(e.date), d));
    const active = sameDay(d, uiState.agendaDate);
    return `<div class="day-item ${has?'has-events':''} ${active?'active':''}" data-date="${d.toISOString()}">
      <div class="dname">${dnames[d.getDay()]}</div><div class="dnum">${d.getDate()}</div><div class="ddot"></div></div>`;
  }).join('');
  strip.querySelectorAll('.day-item').forEach(el=> el.addEventListener('click', ()=>{ uiState.agendaDate = new Date(el.dataset.date); renderDayStrip(); renderAgendaList(); }));
}
function renderAgendaList(){
  const list = document.getElementById('agenda-list');
  const dayEvents = state.events.filter(e=> sameDay(new Date(e.date), uiState.agendaDate)).sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(!dayEvents.length){ list.innerHTML = `<div class="empty-state">Sin tareas o reuniones este día.</div>`; return; }
  list.innerHTML = dayEvents.map(e=>`
    <div class="event-row ${e.completed?'completed':''}" data-id="${e.id}">
      <div class="event-time">${fmtTime(e.date)}</div>
      <div style="flex:1;">
        <div class="event-title">${escapeHtml(e.title)}</div>
        <div class="event-sub">${contactName(e.contactId)} · <span class="chip ${e.type}">${e.type==='tarea'?'Tarea':'Reunión'}</span></div>
      </div>
      <button class="icon-btn ghost complete-btn" data-id="${e.id}">${ICO.check}</button>
    </div>`).join('');
  list.querySelectorAll('.event-row').forEach(row=> row.addEventListener('click', (ev)=>{
    if(ev.target.closest('.complete-btn')) return;
    openEventForm(row.dataset.id);
  }));
  list.querySelectorAll('.complete-btn').forEach(btn=> btn.addEventListener('click', (ev)=>{
    ev.stopPropagation(); toggleEventComplete(btn.dataset.id);
  }));
}
function toggleEventComplete(id){
  const e = state.events.find(x=>x.id===id); if(!e) return;
  e.completed = !e.completed; persist('events'); renderAgendaList();
}
function openEventForm(eventId, contactId, type){
  const e = eventId ? state.events.find(x=>x.id===eventId) : null;
  const dt = e ? new Date(e.date) : new Date();
  const dateStr = dt.toISOString().slice(0,10);
  const timeStr = dt.toTimeString().slice(0,5);
  const html = `<div class="sheet-handle"></div>
  <div class="sheet-header"><button class="icon-btn ghost" id="sheet-close">${ICO.close}</button><h2>${e?'Editar':'Nuevo'} evento</h2></div>
  <div class="sheet-body">
    <form id="event-form">
      <label>Título</label><input name="title" required value="${escapeHtml(e?e.title:'')}">
      <label>Tipo</label>
      <select name="type"><option value="tarea" ${(e?e.type:type)==='tarea'?'selected':''}>Tarea</option><option value="reunion" ${(e?e.type:type)==='reunion'?'selected':''}>Reunión</option></select>
      <label>Contacto</label>
      <select name="contactId">${state.contacts.map(c=>`<option value="${c.id}" ${(e?e.contactId:contactId)===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}</select>
      <label>Fecha</label><input type="date" name="date" value="${dateStr}">
      <label>Hora</label><input type="time" name="time" value="${timeStr}">
      <label style="display:flex; align-items:center; gap:8px; margin-top:12px;"><input type="checkbox" name="reminder" style="width:auto;" ${e&&e.reminder?'checked':''}> Recordatorio</label>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:14px;">Guardar</button>
      ${e?`<button type="button" class="btn btn-danger btn-block" style="margin-top:10px;" id="del-event">Eliminar</button>`:''}
    </form>
  </div>`;
  openSheet(html, (root)=>{
    root.querySelector('#sheet-close').addEventListener('click', closeSheet);
    if(e) root.querySelector('#del-event').addEventListener('click', ()=>{ state.events = state.events.filter(x=>x.id!==e.id); persist('events'); toast('Evento eliminado'); closeSheet(); render(); });
    root.querySelector('#event-form').addEventListener('submit', (ev)=>{
      ev.preventDefault();
      const fd = new FormData(ev.target);
      const iso = new Date(fd.get('date')+'T'+fd.get('time')+':00').toISOString();
      const payload = {title:fd.get('title').trim(), type:fd.get('type'), contactId:fd.get('contactId'), date:iso, reminder: fd.get('reminder')==='on'};
      if(e){ Object.assign(e, payload); toast('Evento actualizado'); }
      else { const ne = Object.assign({id:uid(), completed:false, createdAt:nowIso()}, payload); state.events.push(ne); scheduleReminder(ne); toast('Evento creado'); }
      persist('events'); closeSheet(); render();
      if(uiState.contactDetailId) renderContactDetail();
    });
  });
}
function scheduleReminder(ev){
  if(!ev.reminder) return;
  const delay = new Date(ev.date).getTime() - Date.now();
  if(delay <= 0 || delay > 24*3600*1000) return;
  setTimeout(()=>{
    const msg = `${ev.type==='tarea'?'Tarea':'Reunión'}: ${ev.title}`;
    if('Notification' in window && Notification.permission === 'granted'){ new Notification('MiCRM', {body: msg}); }
    else toast(msg);
  }, delay);
}
if('Notification' in window && Notification.permission === 'default'){
  try{ Notification.requestPermission(); }catch(e){}
}

let leafletMap = null, mapMarkers = [];
function renderMapView(){

function initLeafletMap(){
  const el = document.getElementById('map-el');
  if(typeof L === 'undefined'){ el.innerHTML = `<div class="empty-state">No se pudo cargar el mapa (sin conexión).</div>`; return; }
  try{
    leafletMap = L.map('map-el').setView([19.4326,-99.1332], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'&copy; OpenStreetMap'}).addTo(leafletMap);
    mapMarkers = [];
    state.contacts.filter(c=>c.lat!=null && c.lng!=null).forEach(c=>{
      const marker = L.marker([c.lat, c.lng]).addTo(leafletMap).bindPopup(`<b>${escapeHtml(c.name)}</b><br>${escapeHtml(c.address||'')}`);
      marker.on('click', ()=>{ if(uiState.routeSelection){ toggleRouteContact(c.id); } });
      mapMarkers.push({id:c.id, marker});
    });
    renderRoutePanel();
  }catch(e){ el.innerHTML = `<div class="empty-state">Error al iniciar el mapa.</div>`; }
}
function toggleRouteContact(id){
  const idx = uiState.routeSelection.indexOf(id);
  if(idx>=0) uiState.routeSelection.splice(idx,1); else uiState.routeSelection.push(id);
  renderRoutePanel();
}
let routeLine = null;
function renderRoutePanel(){
  const panel = document.getElementById('route-panel');
  if(!panel) return;
  const candidates = state.contacts.filter(c=>c.lat!=null && c.lng!=null);
  let html = `<div class="card"><h3>Contactos con ubicación</h3>` + candidates.map(c=>`
    <label style="display:flex; align-items:center; gap:8px; padding:6px 0;">
      <input type="checkbox" class="route-check" value="${c.id}" style="width:auto;" ${uiState.routeSelection.includes(c.id)?'checked':''}>
      <span class="avatar" style="width:26px;height:26px;font-size:10px;background:${c.avatarColor}">${initials(c.name)}</span>
      <span style="font-size:13px;">${escapeHtml(c.name)}</span>
    </label>`).join('') + `</div>`;
  if(uiState.routeSelection.length >= 2){
    const points = uiState.routeSelection.map(id=>{ const c=findContact(id); return {id:c.id, lat:c.lat, lng:c.lng, name:c.name}; });
    const {route, totalDist} = nearestNeighborRoute(points);
    html += `<div class="card"><h3>Ruta sugerida · ${totalDist.toFixed(1)} km</h3>` +
      route.map((p,i)=>`<div class="route-stop"><div class="route-num">${i+1}</div><div>${escapeHtml(p.name)}</div></div>`).join('') +
      `<button class="btn btn-primary btn-block" id="open-gmaps" style="margin-top:8px;">Abrir ruta en Google Maps</button></div>`;
    if(leafletMap){
      if(routeLine) leafletMap.removeLayer(routeLine);
      routeLine = L.polyline(route.map(p=>[p.lat,p.lng]), {color:'#E255A1', weight:4}).addTo(leafletMap);
    }
  } else if(routeLine && leafletMap){ leafletMap.removeLayer(routeLine); routeLine = null; }
  panel.innerHTML = html;
  panel.querySelectorAll('.route-check').forEach(chk=> chk.addEventListener('change', ()=>toggleRouteContact(chk.value)));
  const gbtn = document.getElementById('open-gmaps');
  if(gbtn) gbtn.addEventListener('click', ()=>{
    const points = uiState.routeSelection.map(id=>{ const c=findContact(id); return {id:c.id, lat:c.lat, lng:c.lng}; });
    const {route} = nearestNeighborRoute(points);
    const url = 'https://www.google.com/maps/dir/' + route.map(p=>`${p.lat},${p.lng}`).join('/');
    window.open(url, '_blank');
  });
}

/* ===================== VIEW: DASHBOARD ===================== */
let chartInstances = [];
function renderDashboardView(){
  const totalCliente = state.contacts.filter(c=>c.category==='cliente').length;
  const totalLead = state.contacts.filter(c=>c.category==='lead').length;
  const totalPerdida = state.contacts.filter(c=>c.category==='perdida').length;
  const today = new Date();
  const tasksToday = state.events.filter(e=> sameDay(new Date(e.date), today) && !e.completed).length;
  const receivable = state.invoices.filter(i=> i.status==='enviada' || i.status==='vencida')
    .reduce((s,i)=> s + computeInvoiceTotals(i.items, i.ivaRate).total, 0);
  document.getElementById('main').innerHTML = `
    <div class="dash-cards">
      <div class="dash-card"><div class="num">${totalCliente}</div><div class="lbl">Clientes</div></div>
      <div class="dash-card"><div class="num">${totalLead}</div><div class="lbl">Leads</div></div>
      <div class="dash-card"><div class="num">${totalPerdida}</div><div class="lbl">Oport. perdidas</div></div>
      <div class="dash-card"><div class="num">${tasksToday}</div><div class="lbl">Tareas hoy</div></div>
      <div class="dash-card" style="grid-column:1/3;"><div class="num">${fmtMoney(receivable)}</div><div class="lbl">Por cobrar</div></div>
    </div>
    <div class="chart-wrap"><h4>Contactos nuevos por mes</h4><canvas id="chart-contacts" height="180"></canvas></div>
    <div class="chart-wrap"><h4>Facturación mensual</h4><canvas id="chart-billing" height="180"></canvas></div>`;
  renderCharts();
}
function last6Months(){
  const arr = []; const d = new Date();
  for(let i=5;i>=0;i--){ const dd = new Date(d.getFullYear(), d.getMonth()-i, 1); arr.push(dd); }
  return arr;
}
function renderCharts(){
  chartInstances.forEach(ch=>ch.destroy()); chartInstances = [];
  if(typeof Chart === 'undefined') return;
  const months = last6Months();
  const labels = months.map(m=> m.toLocaleDateString('es-MX',{month:'short'}));
  const contactsData = months.map(m=> state.contacts.filter(c=>{ const cd=new Date(c.createdAt); return cd.getFullYear()===m.getFullYear() && cd.getMonth()===m.getMonth(); }).length);
  const billingData = months.map(m=> state.invoices.filter(i=>{ const id=new Date(i.date); return i.status==='pagada' && id.getFullYear()===m.getFullYear() && id.getMonth()===m.getMonth(); }).reduce((s,i)=>s+computeInvoiceTotals(i.items,i.ivaRate).total,0));
  try{
    const ctx1 = document.getElementById('chart-contacts');
    if(ctx1) chartInstances.push(new Chart(ctx1, {type:'bar', data:{labels, datasets:[{label:'Contactos', data:contactsData, backgroundColor:'#5B2A9D'}]}, options:{plugins:{legend:{display:false}}}}));
    const ctx2 = document.getElementById('chart-billing');
    if(ctx2) chartInstances.push(new Chart(ctx2, {type:'line', data:{labels, datasets:[{label:'Facturación', data:billingData, borderColor:'#E255A1', backgroundColor:'rgba(226,85,161,.2)', fill:true, tension:.3}]}, options:{plugins:{legend:{display:false}}}}));
  }catch(e){}
}

/* ===================== VIEW: DOCUMENTS ===================== */
function docIcon(name){
  const ext = (name.split('.').pop()||'').toLowerCase();
  if(['png','jpg','jpeg','gif','webp'].includes(ext)) return ICO.img;
  return ICO.doc;
}
function fmtBytes(n){ if(n<1024) return n+' B'; if(n<1024*1024) return (n/1024).toFixed(1)+' KB'; return (n/1024/1024).toFixed(1)+' MB'; }
function docRowHtml(d){
  return `<div class="doc-row" data-id="${d.id}"><div class="doc-icon">${docIcon(d.name)}</div>
    <div style="flex:1; min-width:0;"><div style="font-weight:700; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(d.name)}</div>
    <div style="font-size:11px; color:var(--muted);">${fmtBytes(d.size)} · ${d.contactId?escapeHtml(contactName(d.contactId)):'Sin vincular'}</div></div></div>`;
}
function renderDocumentsView(){
  document.getElementById('main').innerHTML = `
    <div class="search-bar-inline">${ICO.search}<input id="doc-search" placeholder="Buscar documento..." value="${escapeHtml(uiState.docSearch)}"></div>
    <div class="card"><div style="display:flex; justify-content:space-between; font-size:12px; color:var(--muted);"><span>Almacenamiento usado</span><span id="storage-used"></span></div><div class="storage-bar"><div class="storage-bar-fill" id="storage-fill" style="width:0%"></div></div></div>
    <input type="file" id="doc-file-input" multiple class="hidden">
    <div id="docs-list"></div>`;
  document.getElementById('doc-search').addEventListener('input', (e)=>{ uiState.docSearch = e.target.value; renderDocsList(); });
  document.getElementById('doc-file-input').addEventListener('change', (e)=> handleDocUpload(e.target.files, null));
  renderDocsList();
  updateStorageBar();
}
function renderDocsList(){
  const list = document.getElementById('docs-list'); if(!list) return;
  const q = uiState.docSearch.trim().toLowerCase();
  const docs = state.documents.filter(d=> !q || d.name.toLowerCase().includes(q));
  list.innerHTML = docs.length ? docs.map(docRowHtml).join('') : `<div class="empty-state">Sin documentos.</div>`;
  list.querySelectorAll('.doc-row').forEach(row=> row.addEventListener('click', ()=>openDocDetail(row.dataset.id)));
}
async function updateStorageBar(){
  const used = state.documents.reduce((s,d)=>s+d.size,0) + state.voicenotes.reduce((s,v)=>s+(v.size||0),0);
  const fillEl = document.getElementById('storage-fill'), usedEl = document.getElementById('storage-used');
  if(!fillEl) return;
  let quota = 50*1024*1024;
  try{ if(navigator.storage && navigator.storage.estimate){ const est = await navigator.storage.estimate(); if(est.quota) quota = est.quota; } }catch(e){}
  usedEl.textContent = fmtBytes(used) + ' de ' + fmtBytes(quota);
  fillEl.style.width = Math.min(100, (used/quota)*100) + '%';
}
async function handleDocUpload(files, contactId){
  for(const file of files){
    const id = uid();
    await idbPut('files', {id, blob: file, mime: file.type});
    state.documents.push({id, name:file.name, size:file.size, type:file.type, contactId: contactId||null, createdAt:nowIso()});
  }
  persist('documents'); toast('Documento(s) agregado(s)'); render();
  if(uiState.contactDetailId) renderContactDetail();
}
function openDocUploadForContact(contactId){
  const input = document.createElement('input'); input.type='file'; input.multiple=true;
  input.addEventListener('change', ()=> handleDocUpload(input.files, contactId));
  input.click();
}
function openDocDetail(docId){
  const d = state.documents.find(x=>x.id===docId); if(!d) return;
  const html = `<div class="sheet-handle"></div>
  <div class="sheet-header"><button class="icon-btn ghost" id="sheet-close">${ICO.close}</button><h2>${escapeHtml(d.name)}</h2></div>
  <div class="sheet-body">
    <p style="font-size:13px; color:var(--muted);">${fmtBytes(d.size)} · ${fmtDate(d.createdAt)}</p>
    <label>Vincular a contacto</label>
    <select id="doc-link-contact"><option value="">Sin vincular</option>${state.contacts.map(c=>`<option value="${c.id}" ${d.contactId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}</select>
    <button class="btn btn-primary btn-block" id="doc-save-link" style="margin-top:12px;">Guardar</button>
    <button class="btn btn-outline btn-block" id="doc-download" style="margin-top:10px;">Descargar</button>
    <button class="btn btn-danger btn-block" id="doc-delete" style="margin-top:10px;">Eliminar</button>
  </div>`;
  openSheet(html, (root)=>{
    root.querySelector('#sheet-close').addEventListener('click', closeSheet);
    root.querySelector('#doc-save-link').addEventListener('click', ()=>{
      d.contactId = root.querySelector('#doc-link-contact').value || null;
      persist('documents'); toast('Actualizado'); closeSheet(); render();
    });
    root.querySelector('#doc-download').addEventListener('click', async ()=>{
      const rec = await idbGet('files', d.id); if(!rec){ toast('Archivo no disponible'); return; }
      const url = URL.createObjectURL(rec.blob); const a=document.createElement('a'); a.href=url; a.download=d.name; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),2000);
    });
    root.querySelector('#doc-delete').addEventListener('click', ()=>{
      confirmDialog('¿Eliminar este documento?', async ()=>{
        await idbDelete('files', d.id);
        state.documents = state.documents.filter(x=>x.id!==d.id); persist('documents'); closeSheet(); render();
      });
    });
  });
}

const GROUP_COLORS = ['#1fb978','#3d8bff','#e5484d','#f5a524','#E255A1','#5B2A9D'];

    root.querySelector('#save-group').addEventListener('click', ()=>{

      state.groups.push({id:uid(), name, color:selColor}); persist('groups'); closeSheet(); render();

    persist('settings'); toast('Ajustes guardados'); render();

  document.getElementById('theme-switch').addEventListener('click', ()=>{

  document.getElementById('pin-btn').addEventListener('click', openPinSetup);

    reader.onload = ()=>{

  document.getElementById('wipe-data').addEventListener('click', ()=>{

function fileToDataUrl(file){ return new Promise((res)=>{ const r = new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(file); }); }
function openPinSetup(){
  const html = `<div class="sheet-handle"></div>
  <div class="sheet-header"><button class="icon-btn ghost" id="sheet-close">${ICO.close}</button><h2>Configurar PIN</h2></div>
  <div class="sheet-body">
    <label>Nuevo PIN (4 dígitos)</label><input id="pin1" maxlength="4" inputmode="numeric" type="password">
    <label>Confirmar PIN</label><input id="pin2" maxlength="4" inputmode="numeric" type="password">
    <button class="btn btn-primary btn-block" id="save-pin" style="margin-top:12px;">Guardar PIN</button>
    ${state.settings.pinHash?`<button class="btn btn-outline btn-block" id="remove-pin" style="margin-top:10px;">Quitar PIN</button>`:''}
  </div>`;
  openSheet(html, (root)=>{
    root.querySelector('#sheet-close').addEventListener('click', closeSheet);
    root.querySelector('#save-pin').addEventListener('click', async ()=>{
      const p1 = root.querySelector('#pin1').value, p2 = root.querySelector('#pin2').value;
      if(!/^\d{4}$/.test(p1)){ toast('El PIN debe tener 4 dígitos'); return; }
      if(p1 !== p2){ toast('Los PIN no coinciden'); return; }
      state.settings.pinHash = await sha256(p1); persist('settings'); toast('PIN configurado'); closeSheet(); render();
    });
    const rm = root.querySelector('#remove-pin');
    if(rm) rm.addEventListener('click', ()=>{ state.settings.pinHash = null; persist('settings'); toast('PIN eliminado'); closeSheet(); render(); });
  });
}

/* ===================== CONFIRM DIALOG ===================== */
function confirmDialog(msg, onYes){
  const html = `<div class="sheet-handle"></div><div class="sheet-body" style="text-align:center; padding-top:20px;">
    <p style="font-size:14.5px;">${escapeHtml(msg)}</p>
    <div style="display:flex; gap:10px; margin-top:14px;">
      <button class="btn btn-outline" style="flex:1;" id="cd-no">Cancelar</button>
      <button class="btn btn-danger" style="flex:1;" id="cd-yes">Confirmar</button>
    </div></div>`;
  openSheet(html, (root)=>{
    root.querySelector('#cd-no').addEventListener('click', closeSheet);
    root.querySelector('#cd-yes').addEventListener('click', ()=>{ closeSheet(); onYes(); });
  });
}

/* ===================== MASTER RENDER ===================== */
function render(){
  renderHeader(); renderFab();
  if(currentView === 'contacts') renderContactsView();
  else if(currentView === 'agenda') renderAgendaView();
  else if(currentView === 'map') renderMapView();
  else if(currentView === 'invoices') renderInvoicesView();
  else if(currentView === 'more') renderMoreView();
  else if(currentView === 'dashboard') renderDashboardView();
  else if(currentView === 'documents') renderDocumentsView();
  else if(currentView === 'fields') renderFieldsView();
  else if(currentView === 'settings') renderSettingsView();
  document.querySelectorAll('#bottom-nav button').forEach(b=> b.classList.toggle('active', b.dataset.view===currentView || (['dashboard','documents','fields','settings'].includes(currentView) && b.dataset.view==='more')));
}
